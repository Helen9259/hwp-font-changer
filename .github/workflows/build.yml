name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install pyinstaller pywin32

      - name: EXE 빌드
        run: |
          pyinstaller --clean hwp_font_changer.spec

      - name: GitHub Release 업로드
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/HWP_Font_Changer.exe
          tag_name: ${{ github.ref_name }}
          name: "HWP 서체 변경 ${{ github.ref_name }}"
          body: |
            ## HWP 서체 일괄 변경 프로그램
            - 한글 백그라운드 Visible 해제 및 특정 서체 변환 기능 롤백 버전
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
